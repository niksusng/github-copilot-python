<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sudoku Game</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <div class="hero-top">
        <div>
          <h1>Sudoku Game</h1>
          <p class="subtitle">Solve the board, use hints, and save your best scores.</p>
        </div>
        <button id="dark-mode-toggle" class="secondary-button" type="button" aria-pressed="false">Dark Mode</button>
      </div>
    </header>

    <main class="page-grid">
      <section class="game-panel">
        <div class="panel-header">
          <div class="control-row">
            <label for="difficulty">Difficulty</label>
            <select id="difficulty">
              <option value="easy">Easy</option>
              <option value="medium" selected>Medium</option>
              <option value="hard">Hard</option>
            </select>
            <button id="new-game">New Game</button>
            <button id="hint-button">Hint</button>
            <button id="check-solution">Check Puzzle</button>
          </div>
          <div class="status-row">
            <div class="status-item">
              <span>Time</span>
              <strong id="timer">00:00</strong>
            </div>
            <div class="status-item">
              <span>Hints</span>
              <strong id="hint-count">0</strong>
            </div>
            <div class="status-item message-box">
              <span>Message</span>
              <strong id="message">Ready to play.</strong>
            </div>
          </div>
        </div>

        <div id="sudoku-board" class="board" aria-label="Sudoku board"></div>
      </section>

      <aside class="score-panel">
        <section class="scoreboard">
          <h2>Top 10 Scores</h2>
          <button id="reset-leaderboard">Reset Leaderboard</button>
          <table id="score-table">
            <thead>
              <tr>
                <th>Name</th>
                <th>Time</th>
                <th>Hints</th>
                <th>Difficulty</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </section>
      </aside>
    </main>
  </div>

  <script src="/static/main.js"></script>
</body>
</html>
